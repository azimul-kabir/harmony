<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#080c1c">
    <title>Harmony is offline</title>
    <style>
        :root { color-scheme: dark; font-family: system-ui, sans-serif; }
        body {
            align-items: center;
            background: #080c1c;
            color: #f7f8ff;
            display: flex;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            text-align: center;
        }
        main { max-width: 28rem; }
        img { aspect-ratio: 1 / 1; border-radius: 24%; height: 112px; width: 112px; }
        h1 { font-size: 1.65rem; margin: 24px 0 8px; }
        p { color: #adb5d3; line-height: 1.6; margin: 0 0 24px; }
        button {
            background: #369cff;
            border: 0;
            border-radius: 999px;
            color: #07101f;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            padding: 12px 22px;
        }
    </style>
</head>
<body>
<main>
    <img src="/static/pwa/icon-192.png" alt="">
    <h1>Harmony is offline</h1>
    <p>Reconnect to your Harmony server to manage downloads, playlists, and your music library.</p>
    <button type="button" onclick="window.location.reload()">Try again</button>
</main>
</body>
</html>
