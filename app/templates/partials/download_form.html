<section class="card">
    <h2>Download Music</h2>

    <form id="download-form">
        <input
            id="spotify-url"
            name="spotify_url"
            type="url"
            placeholder="Paste a Spotify track, album or playlist URL"
            required
        >

        <button type="submit">
            Download
        </button>
    </form>

    <div id="download-result"></div>
</section>
