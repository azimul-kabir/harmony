<section class="card">
    <h2>Download Music</h2>

    <form id="download-form">
        <input
            id="spotify-url"
            name="url"
            type="url"
            placeholder="Paste a Spotify or YouTube Music URL"
            required
        >

        <p class="form-hint">YouTube Music availability depends on public YouTube access and yt-dlp.</p>

        <button type="submit">
            Download
        </button>
    </form>

    <div id="download-result"></div>
</section>
