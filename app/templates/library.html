{% extends "base.html" %} 
{% block title %}Library Manager{% endblock %} 

{% block content %} 
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h1 style="margin: 0;">Local Library</h1>
    <button id="btn-rescan" class="btn-secondary" style="padding: 10px 16px; font-weight: 600; background: white;">
        ↻ Rescan Library
    </button>
</div>

<div class="panel" style="padding: 0;">
    <div class="filters-bar" style="padding: 20px 24px; border-bottom: 1px solid #eee; margin-bottom: 0;">
        <input 
            type="text" 
            id="library-search" 
            class="search-input" 
            placeholder="Search by title, artist, or album..." 
            style="width: 350px;"
            autocomplete="off"
        >
        <button id="delete-selected" class="btn-danger" disabled>Delete Selected</button>
    </div>
    
    <div class="table-responsive">
        <table class="table command-table" style="border-radius: 0; box-shadow: none; margin: 0;">
            <thead>
                <tr>
                    <th style="width: 40px; padding-left: 24px;">
                        <input type="checkbox" id="select-all" style="cursor: pointer;">
                    </th>
                    <th>Title</th>
                    <th>Artist</th>
                    <th>Album</th>
                </tr>
            </thead>
            <tbody id="library-body">
                <tr>
                        <td colspan="4" style="padding: 0;">
                            <div class="skeleton-row">
                                <div class="skeleton-avatar skeleton" style="width:24px; height:24px; border-radius:4px;"></div>
                                <div class="skeleton-row-content">
                                    <div class="skeleton skeleton-text title"></div>
                                    <div class="skeleton skeleton-text short"></div>
                                </div>
                            </div>
                            <div class="skeleton-row">
                                <div class="skeleton-avatar skeleton" style="width:24px; height:24px; border-radius:4px;"></div>
                                <div class="skeleton-row-content">
                                    <div class="skeleton skeleton-text title" style="width:50%;"></div>
                                    <div class="skeleton skeleton-text short" style="width:30%;"></div>
                                </div>
                            </div>
                            <div class="skeleton-row" style="border-bottom: none;">
                                <div class="skeleton-avatar skeleton" style="width:24px; height:24px; border-radius:4px;"></div>
                                <div class="skeleton-row-content">
                                    <div class="skeleton skeleton-text title" style="width:60%;"></div>
                                    <div class="skeleton skeleton-text short" style="width:45%;"></div>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
        </table>
    </div>

    <!-- Pagination Controls -->
    <div class="pagination-controls" style="border-radius: 0 0 16px 16px; background: #fdfdfd; margin-top: 0; padding: 16px 24px;">
        <button id="btn-prev" class="btn-secondary" disabled>Previous</button>
        <span id="page-info" style="font-weight: 600; color: #555;">Page 1</span>
        <button id="btn-next" class="btn-secondary" disabled>Next</button>
    </div>
</div>
{% endblock %} 

{% block scripts %} 
<script src="/static/js/library.js"></script> 
{% endblock %}
