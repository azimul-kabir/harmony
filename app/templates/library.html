{% extends "base.html" %}

{% block title %}Library Manager{% endblock %}

{% block content %}
<h1>Library Manager</h1>

<div class="panel">
    <div class="filters-bar">
        <input type="text" id="library-search" class="search-input" placeholder="Search by title, artist, or album...">
        <button id="delete-selected" class="btn-danger" disabled>Delete Selected</button>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="select-all"></th>
                <th>Title</th>
                <th>Artist</th>
                <th>Album</th>
            </tr>
        </thead>
        <tbody id="library-body">
            <!-- Populated by JS -->
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/library.js"></script>
{% endblock %}
