{% extends "base.html" %}

{% block title %}Library Manager{% endblock %}

{% block content %}
<h1>Library Manager</h1>

<div class="panel">
    <div class="filters-bar" style="margin-bottom: 20px;">
        <input type="text" id="library-search" class="search-input" placeholder="Search by title, artist, or album..." style="width: 300px;">
        <button id="delete-selected" class="btn-danger" disabled>Delete Selected</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="table">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="select-all"></th>
                    <th>Title</th>
                    <th>Artist</th>
                    <th>Album</th>
                </tr>
            </thead>
            <tbody id="library-body">
                <tr><td colspan="4" style="text-align:center; padding: 20px;">Loading library...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination Controls -->
    <div class="pagination-controls">
        <button id="btn-prev" class="btn-secondary" disabled>Previous</button>
        <span id="page-info" style="font-weight: 600; color: #555;">Page 1</span>
        <button id="btn-next" class="btn-secondary" disabled>Next</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/library.js"></script>
{% endblock %}
