{% extends "base.html" %} 
{% block title %}Downloads{% endblock %} 

{% block content %} 
<div class="downloads-header">
    <div><span class="library-eyebrow">Download queue</span><h1>Command Center</h1></div>
    <button id="clear-history-btn" class="btn-danger" style="padding: 8px 14px; font-size: 0.85rem;">Clear History</button>
</div>

<section class="downloads-summary" aria-label="Download queue summary">
    <button type="button" class="downloads-summary-card" data-summary-filter="ACTIVE"><span>Running</span><strong id="downloads-running">—</strong></button>
    <button type="button" class="downloads-summary-card" data-summary-filter="ACTIVE"><span>Queued</span><strong id="downloads-queued">—</strong></button>
    <button type="button" class="downloads-summary-card" data-summary-filter="COMPLETED"><span>Completed</span><strong id="downloads-completed">—</strong></button>
    <button type="button" class="downloads-summary-card downloads-summary-attention" data-summary-filter="FAILED"><span>Needs attention</span><strong id="downloads-attention">—</strong></button>
</section>

<!-- Compact Download Form -->
<div class="panel" style="padding: 12px; margin-bottom: 16px;">
    <form id="download-form" style="display: flex; gap: 8px; margin: 0;">
        <input 
            type="url" 
            id="spotify-url" 
            placeholder="Paste Spotify URL..." 
            required 
            autocomplete="off"
            style="flex: 1; padding: 10px 12px; border: 1px solid var(--border-input); border-radius: 6px; font-size: 0.95rem; background: var(--bg-surface); color: var(--text-main); min-width: 0;"
        >
        <button type="submit" id="download-submit-btn" class="btn-primary" style="padding: 10px 16px; font-size: 0.95rem; border-radius: 6px;">Download</button>
    </form>
    <div id="download-result"></div>
</div>

<div class="panel" style="padding: 0; overflow: hidden;">
    <div class="filters-bar" style="padding: 16px 20px 0 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 0;">
        <div class="filter-tabs" id="status-filters">
            <button class="filter-tab active" data-filter="ALL">All</button>
            <button class="filter-tab" data-filter="ACTIVE">Active</button>
            <button class="filter-tab" data-filter="COMPLETED">Completed</button>
            <button class="filter-tab" data-filter="FAILED">Failed</button>
        </div>
        <div style="padding-bottom: 16px;">
            <input type="text" id="search-input" class="search-input" placeholder="Search song, artist, album..." style="padding: 10px 14px; font-size: 0.9rem;">
            <small id="downloads-visible-count" class="downloads-visible-count" aria-live="polite"></small>
        </div>
    </div>
    <div class="table-responsive">
        <table class="table command-table" style="border-radius: 0; margin: 0;">
            <thead>
                <tr>
                    <th style="width: 120px; padding-left: 24px;">Status</th>
                    <th>Song</th>
                    <th>Artist</th>
                    <th>Album</th>
                    <th style="width: 100px; text-align: right; padding-right: 24px;">Actions</th>
                </tr>
            </thead>
            <tbody id="downloads-body">
                <tr>
                    <td colspan="5" style="padding: 0;">
                        <div class="skeleton-row">
                            <div class="skeleton skeleton-text" style="width: 80px; height: 24px; border-radius: 999px;"></div>
                            <div class="skeleton-row-content" style="margin-left: 16px;">
                                <div class="skeleton skeleton-text title" style="margin-bottom: 6px;"></div>
                                <div class="skeleton skeleton-text short"></div>
                            </div>
                        </div>
                        <div class="skeleton-row">
                            <div class="skeleton skeleton-text" style="width: 80px; height: 24px; border-radius: 999px;"></div>
                            <div class="skeleton-row-content" style="margin-left: 16px;">
                                <div class="skeleton skeleton-text title" style="width: 40%; margin-bottom: 6px;"></div>
                                <div class="skeleton skeleton-text short" style="width: 20%;"></div>
                            </div>
                        </div>
                        <div class="skeleton-row" style="border-bottom: none;">
                            <div class="skeleton skeleton-text" style="width: 80px; height: 24px; border-radius: 999px;"></div>
                            <div class="skeleton-row-content" style="margin-left: 16px;">
                                <div class="skeleton skeleton-text title" style="width: 60%; margin-bottom: 6px;"></div>
                                <div class="skeleton skeleton-text short" style="width: 35%;"></div>
                            </div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %} 

{% block scripts %} 
<script src="/static/js/downloads.js"></script> 
{% endblock %}
