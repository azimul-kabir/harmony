{% extends "base.html" %} 
{% block title %}Downloads{% endblock %} 

{% block content %} 
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h1 style="margin: 0;">Command Center</h1>
    <button id="clear-history-btn" class="btn-danger">Clear History</button>
</div>

<div class="panel" style="margin-bottom: 24px;">
    <form id="download-form" style="margin: 0;">
        <input 
            type="url" 
            id="spotify-url" 
            placeholder="Paste Spotify Track, Album, or Playlist URL..." 
            required 
            autocomplete="off"
        >
        <button type="submit" id="download-submit-btn">Download</button>
    </form>
    <div id="download-result"></div>
</div>

<div class="panel" style="padding: 0;">
    <div class="filters-bar" style="padding: 20px 24px 0 24px; border-bottom: 1px solid #eee; margin-bottom: 0;">
        <div class="filter-tabs" id="status-filters">
            <button class="filter-tab active" data-filter="ALL">All</button>
            <button class="filter-tab" data-filter="ACTIVE">Active</button>
            <button class="filter-tab" data-filter="COMPLETED">Completed</button>
            <button class="filter-tab" data-filter="FAILED">Failed</button>
        </div>
        <div style="padding-bottom: 16px;">
            <input type="text" id="search-input" class="search-input" placeholder="Search song, artist, album...">
        </div>
    </div>

    <table class="table command-table" style="border-radius: 0 0 16px 16px; box-shadow: none;">
        <thead>
            <tr>
                <th style="width: 140px; padding-left: 24px;">Status</th>
                <th>Song</th>
                <th>Artist</th>
                <th>Album</th>
                <th style="width: 100px; text-align: right; padding-right: 24px;">Actions</th>
            </tr>
        </thead>
        <tbody id="downloads-body">
            <tr>
                <td colspan="5" class="text-center empty-state" style="padding: 40px;">Loading real-time data...</td>
            </tr>
        </tbody>
    </table>
</div>
{% endblock %} 

{% block scripts %} 
<script src="/static/js/downloads.js"></script> 
{% endblock %}
