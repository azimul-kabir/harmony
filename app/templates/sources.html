{% extends "base.html" %} 
{% block title %}Sources{% endblock %} 

{% block content %} 
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h1 style="margin: 0;">Automation Sources</h1>
</div>

<div class="panel" style="margin-bottom: 24px;">
    <p style="margin: 0 0 16px 0; color: var(--text-muted); font-size: 1.05rem;">
        Add Spotify playlists here to automatically keep your local library synced.
    </p>
    <form id="add-source-form" class="form-row" style="margin: 0;">
        <input
            id="source-url"
            type="url"
            placeholder="Paste a Spotify Playlist URL..."
            required
            autocomplete="off"
        >
        <button type="submit">
            + Add Source
        </button>
    </form>
</div>

<div id="sources" class="sources-grid"></div>
{% endblock %} 

{% block scripts %} 
<script>
    // Pass ALL user settings directly to Javascript
    window.USER_TIMEZONE = "{{ general.timezone if general else 'UTC' }}";
    window.USER_DATE_FORMAT = "{{ general.date_format if general else 'DD/MM/YYYY' }}";
    window.USER_TIME_FORMAT = "{{ general.time_format if general else '12h' }}";
</script>
<!-- The ?v={{ version }} forces your phone to download the newest Javascript file -->
<script src="/static/js/sources.js?v={{ version }}"></script> 
{% endblock %}
