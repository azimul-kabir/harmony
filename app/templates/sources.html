{% extends "base.html" %} 
{% block title %}Sources{% endblock %} 

{% block content %} 
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h1 style="margin: 0;">Automation Sources</h1>
</div>

<div class="panel" style="margin-bottom: 24px;">
    <p style="margin: 0 0 16px 0; color: var(--text-muted); font-size: 1.05rem;">
        Add Spotify playlists here to automatically keep your local library synced.
    </p>
    <form id="add-source-form" class="form-row" style="margin: 0;">
        <input
            id="source-url"
            type="url"
            placeholder="Paste a Spotify Playlist URL..."
            required
            autocomplete="off"
        >
        <button type="submit">
            + Add Source
        </button>
    </form>
</div>

<div id="sources" class="sources-grid">
    <!-- Skeleton Loading State -->
    <div class="skeleton-card">
        <div style="display: flex; justify-content: space-between;">
            <div class="skeleton skeleton-text title"></div>
            <div class="skeleton skeleton-text" style="width: 60px; height: 24px; border-radius: 999px;"></div>
        </div>
        <div class="skeleton skeleton-text" style="height: 60px; border-radius: 8px;"></div>
        <div style="display: flex; gap: 8px; margin-top: auto;">
            <div class="skeleton skeleton-text" style="height: 36px; border-radius: 6px; flex: 1;"></div>
            <div class="skeleton skeleton-text" style="height: 36px; border-radius: 6px; flex: 1;"></div>
        </div>
    </div>
    
    <div class="skeleton-card">
        <div style="display: flex; justify-content: space-between;">
            <div class="skeleton skeleton-text title" style="width: 50%;"></div>
            <div class="skeleton skeleton-text" style="width: 60px; height: 24px; border-radius: 999px;"></div>
        </div>
        <div class="skeleton skeleton-text" style="height: 60px; border-radius: 8px;"></div>
        <div style="display: flex; gap: 8px; margin-top: auto;">
            <div class="skeleton skeleton-text" style="height: 36px; border-radius: 6px; flex: 1;"></div>
            <div class="skeleton skeleton-text" style="height: 36px; border-radius: 6px; flex: 1;"></div>
        </div>
    </div>
</div>
{% endblock %} 

{% block scripts %} 
<script>
    // Pass the user's timezone from the database to Javascript
    window.USER_TIMEZONE = "{{ general.timezone if general else 'UTC' }}";
</script>
<script src="/static/js/sources.js"></script> 
{% endblock %}
