{% extends "base.html" %} 
{% block title %}Sources{% endblock %} 

{% block content %} 
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
    <h1 style="margin: 0;">Automation Sources</h1>
</div>

<div class="panel" style="margin-bottom: 24px;">
    <p style="margin: 0 0 16px 0; color: var(--text-muted); font-size: 1.05rem;">
        Add Spotify playlists here to automatically keep your local library synced.
    </p>
    <form id="add-source-form" class="form-row" style="margin: 0;">
        <input
            id="source-url"
            type="url"
            placeholder="Paste a Spotify Playlist URL..."
            required
            autocomplete="off"
        >
        <button type="submit">
            + Add Source
        </button>
    </form>
</div>

<div id="sources" class="sources-grid">
    <div style="grid-column: 1 / -1; padding: 40px; text-align: center; background: var(--bg-surface); border-radius: 16px; border: 1px solid var(--border-color);" class="empty-state">
        <span class="spinner"></span> Loading sources...
    </div>
</div>
{% endblock %} 

{% block scripts %} 
<script src="/static/js/sources.js"></script> 
{% endblock %}
