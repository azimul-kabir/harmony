services:
  harmony:
    build: .
    container_name: harmony

    ports:
      - "8080:8080"

    volumes:
      - ./database:/database
      - ./logs:/logs
      - /volume1/music/library:/music
      - /volume1/music/incoming:/downloads

    restart: unless-stopped

    environment:
      SPOTIFY_GENRE_ENRICHMENT_ENABLED: "false"
      SPOTIFY_CLIENT_ID: ""
      SPOTIFY_CLIENT_SECRET: ""

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
